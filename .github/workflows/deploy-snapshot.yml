name: Deploy SNAPSHOT to Nexus lean

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: lean
          server-username: LEAN_NEXUS_USERNAME
          server-password: LEAN_NEXUS_PASSWORD

      - name: Deploy lean-engine SNAPSHOT
        env:
          LEAN_NEXUS_USERNAME: ${{ secrets.LEAN_NEXUS_USERNAME }}
          LEAN_NEXUS_PASSWORD: ${{ secrets.LEAN_NEXUS_PASSWORD }}
        run: |
          # Only deploy snapshot versions from master
          version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "project.version=${version}"
          if [[ "${version}" != *-SNAPSHOT ]]; then
            echo "Not a SNAPSHOT version; skipping deploy."
            exit 0
          fi
          mvn -B clean deploy -DskipTests
